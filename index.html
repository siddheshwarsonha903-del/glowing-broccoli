<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Slate Background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            box-shadow: 0 0 25px #008080; /* Beautiful Teal Glow */
            border-radius: 12px;
        }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    backgroundColor: '#0f172a', // Slate Background
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 1100 },
            debug: false
        }
    },
    scale: {
        mode: Phaser.Scale.FIT, // मोबाइल स्क्रीन पर ऑटोमैटिक फिट करने के लिए
        autoCenter: Phaser.Scale.CENTER_BOTH, // स्क्रीन के बीच में रखने के लिए
        width: 800,
        height: 400
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);
let player;
let platforms;
let cursors;
let score = 0;
let scoreText;
let obstacleTimer;
let obstacles;
let isGameOver = false;

function preload() {
    // बिना बाहरी इमेज के इन-गेम ग्राफिक्स जनरेट करेंगे
}

function create() {
    isGameOver = false;

    // 1. NEON RUNNER Title Text with Teal Glow
    let titleText = this.add.text(400, 50, 'NEON RUNNER', { 
        fontSize: '42px', 
        fill: '#008080', 
        fontWeight: 'bold', 
        fontFamily: 'Arial' 
    }).setOrigin(0.5);
    titleText.setShadow(0, 0, '#008080', 20, true, true);

    // Score Text
    scoreText = this.add.text(20, 20, 'Score: 0', { 
        fontSize: '22px', 
        fill: '#ffffff', 
        fontWeight: 'bold',
        fontFamily: 'Arial' 
    });

    // 2. Base Platform Setup
    platforms = this.physics.add.staticGroup();
    
    let groundGraphics = this.add.graphics();
    groundGraphics.fillStyle(0x008080, 1); // Teal Color
    groundGraphics.fillRect(0, 0, 800, 40);
    groundGraphics.generateTexture('ground', 800, 40);
    
    platforms.create(400, 380, 'ground').refreshBody();

    // 3. Player (Cyan glowing cube)
    let playerGraphics = this.add.graphics();
    playerGraphics.fillStyle(0x00ffff, 1); // Bright Cyan/Teal
    playerGraphics.fillRect(0, 0, 32, 32);
    playerGraphics.generateTexture('player', 32, 32);

    player = this.physics.add.sprite(120, 300, 'player');
    player.setCollideWorldBounds(true);
    
    // Colliders
    this.physics.add.collider(player, platforms);

    // 4. Obstacles Setup (Neon Red)
    obstacles = this.physics.add.group();
    this.physics.add.collider(obstacles, platforms);
    
    // Collision detection for Game Over
    this.physics.add.overlap(player, obstacles, gameOver, null, this);

    // Controls
    cursors = this.input.keyboard.createCursorKeys();
    
    // मोबाइल टच के लिए पूरी स्क्रीन पर कहीं भी टैप करने पर जंप
    this.input.on('pointerdown', function () {
        if (isGameOver) {
            restartGame.call(this.scene.scene);
        } else if (player.body.touching.down) {
            player.setVelocityY(-480);
        }
    }, this);

    // हर 1.5 सेकंड में एक बाधा आएगी
    obstacleTimer = this.time.addEvent({
        delay: 1500,
        callback: spawnObstacle,
        callbackScope: this,
        loop: true
    });
}

function update() {
    if (isGameOver) return;

    // Keyboard controls (Space or Up Arrow for Jump)
    if ((cursors.up.isDown || cursors.space.isDown) && player.body.touching.down) {
        player.setVelocityY(-480);
    }

    // स्कोर अपडेट
    score += 1;
    scoreText.setText('Score: ' + Math.floor(score / 10));
}

function spawnObstacle() {
    if (isGameOver) return;

    let obstacleGraphics = this.add.graphics();
    obstacleGraphics.fillStyle(0xff0055, 1); // Glowing Neon Red/Pink
    obstacleGraphics.fillRect(0, 0, 24, 44);
    obstacleGraphics.generateTexture('obstacle', 24, 44);

    let obstacle = obstacles.create(850, 335, 'obstacle');
    // गेम जैसे-जैसे आगे बढ़ेगा, स्पीड थोड़ी बढ़ती जाएगी
    obstacle.setVelocityX(-320 - (score * 0.04)); 
    obstacle.setCollideWorldBounds(false);
    
    // स्क्रीन से बाहर जाने पर मेमोरी से डिलीट करना
    obstacle.checkWorldBounds = true;
    obstacle.outOfBoundsKill = true;
}

function gameOver() {
    isGameOver = true;
    this.physics.pause();
    obstacleTimer.destroy();
    player.setTint(0xff0000); // Player turns red on crash
    
    let overText = this.add.text(400, 200, 'GAME OVER\n\nTap Screen or Press Space to Restart', { 
        fontSize: '28px', 
        fill: '#ff0055', 
        fontWeight: 'bold',
        align: 'center',
        fontFamily: 'Arial' 
    }).setOrigin(0.5);
    overText.setShadow(0, 0, '#ff0055', 10, true, true);
    
    // Keyboard से रिस्टार्ट करने के लिए
    this.input.keyboard.once('keydown-SPACE', () => {
        restartGame.call(this);
    });
}

function restartGame() {
    score = 0;
    this.restart();
}
</script>

</body>
</html>
