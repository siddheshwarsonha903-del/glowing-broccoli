<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Slate Background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            box-shadow: 0 0 25px #008080; /* Teal Glow */
            border-radius: 12px;
        }
    </style>
</head>
<body>

<script>
// आपका Adsterra Direct Link
const AD_LINK = "https://www.effectivecpmnetwork.com/ked54dtp?key=c6c7a9147cbc1f9a73a66f3b0482881e";

const config = {
    type: Phaser.AUTO,
    backgroundColor: '#0f172a',
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 1100 },
            debug: false
        }
    },
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 800,
        height: 400
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);
let player;
let platforms;
let cursors;
let score = 0;
let scoreText;
let obstacleTimer;
let obstacles;
let isGameOver = false;

function preload() {}

function create() {
    isGameOver = false;

    // Title Text with Teal Glow
    let titleText = this.add.text(400, 40, 'NEON RUNNER', { 
        fontSize: '38px', 
        fill: '#008080', 
        fontWeight: 'bold', 
        fontFamily: 'Arial' 
    }).setOrigin(0.5);
    titleText.setShadow(0, 0, '#008080', 20, true, true);

    // Score Text
    scoreText = this.add.text(20, 20, 'Score: 0', { 
        fontSize: '22px', 
        fill: '#ffffff', 
        fontWeight: 'bold',
        fontFamily: 'Arial' 
    });

    // Platforms
    platforms = this.physics.add.staticGroup();
    let groundGraphics = this.add.graphics();
    groundGraphics.fillStyle(0x008080, 1);
    groundGraphics.fillRect(0, 0, 800, 40);
    groundGraphics.generateTexture('ground', 800, 40);
    platforms.create(400, 380, 'ground').refreshBody();

    // Player
    let playerGraphics = this.add.graphics();
    playerGraphics.fillStyle(0x00ffff, 1);
    playerGraphics.fillRect(0, 0, 32, 32);
    playerGraphics.generateTexture('player', 32, 32);

    player = this.physics.add.sprite(120, 300, 'player');
    player.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // Obstacles
    obstacles = this.physics.add.group();
    this.physics.add.collider(obstacles, platforms);
    this.physics.add.overlap(player, obstacles, gameOver, null, this);

    // Controls
    cursors = this.input.keyboard.createCursorKeys();
    
    // Jump on Screen Tap
    this.input.on('pointerdown', function () {
        if (!isGameOver && player.body.touching.down) {
            player.setVelocityY(-480);
        }
    }, this);

    obstacleTimer = this.time.addEvent({
        delay: 1500,
        callback: spawnObstacle,
        callbackScope: this,
        loop: true
    });
}

function update() {
    if (isGameOver) return;

    if ((cursors.up.isDown || cursors.space.isDown) && player.body.touching.down) {
        player.setVelocityY(-480);
    }

    score += 1;
    scoreText.setText('Score: ' + Math.floor(score / 10));
}

function spawnObstacle() {
    if (isGameOver) return;

    let obstacleGraphics = this.add.graphics();
    obstacleGraphics.fillStyle(0xff0055, 1);
    obstacleGraphics.fillRect(0, 0, 24, 44);
    obstacleGraphics.generateTexture('obstacle', 24, 44);

    let obstacle = obstacles.create(850, 335, 'obstacle');
    obstacle.setVelocityX(-320 - (score * 0.04)); 
    obstacle.setCollideWorldBounds(false);
    obstacle.checkWorldBounds = true;
    obstacle.outOfBoundsKill = true;
}

function gameOver() {
    isGameOver = true;
    this.physics.pause();
    obstacleTimer.destroy();
    player.setTint(0xff0000);
    
    // Game Over Text
    let overText = this.add.text(400, 160, 'GAME OVER', { 
        fontSize: '36px', 
        fill: '#ff0055', 
        fontWeight: 'bold',
        fontFamily: 'Arial' 
    }).setOrigin(0.5);
    overText.setShadow(0, 0, '#ff0055', 10, true, true);

    // Clickable Ad / Restart Button
    let btnBg = this.add.graphics();
    btnBg.fillStyle(0x008080, 1);
    btnBg.fillRoundedRect(250, 240, 300, 60, 12);

    let btnText = this.add.text(400, 270, 'PLAY AGAIN 🚀', {
        fontSize: '22px',
        fill: '#ffffff',
        fontWeight: 'bold',
        fontFamily: 'Arial'
    }).setOrigin(0.5);

    // Interactive Button Actions
    let restartBtn = this.add.zone(400, 270, 300, 60).setInteractive();

    restartBtn.on('pointerdown', () => {
        // 1. Adsterra Direct Link को नई टैब में खोलना (Monetization)
        window.open(AD_LINK, '_blank');
        
        // 2. गेम को रिस्टार्ट करना
        this.scene.restart();
    });
}
</script>

</body>
</html>
